name: Release

# Builds the publish artifact and attaches it to a GitHub Release
# whenever a tag matching v*.*.* is pushed.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup .NET
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: 9.0.x

      - name: Publish single-file exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          ./scripts/publish.ps1 -Version $version
          Compress-Archive -Path publish/AudioCarousel.exe `
                           -DestinationPath publish/AudioCarousel-$version-win-x64.zip

      - name: Upload to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: publish/AudioCarousel-*-win-x64.zip
          generate_release_notes: true
