name: Release

# Builds the publish artifact and attaches it to a GitHub Release
# whenever a tag matching v*.*.* is pushed.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 9.0.x

      - name: Publish single-file exe
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}" -replace '^v', ''
          ./scripts/publish.ps1 -Version $version
          Compress-Archive -Path publish/AudioCarousel.exe `
                           -DestinationPath publish/AudioCarousel-$version-win-x64.zip

      - name: Upload to release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          files: publish/AudioCarousel-*-win-x64.zip
          generate_release_notes: true
